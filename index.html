
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-TRADING PRO LIVE</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; margin: 0; }
        header { padding: 12px; background: #161a1e; display: flex; justify-content: space-between; border-bottom: 1px solid #2b2f36; }
        #chart-area { height: 45vh; width: 100%; background: #000; position: relative; }
        #tv_chart { height: 100%; width: 100%; }
        .ui-panel { padding: 15px; background: #161a1e; border-radius: 20px 20px 0 0; }
        #bal-display { color: #00ff88; font-weight: bold; }
        input { width: 100%; background: #2b3139; border: 1px solid #474d57; color: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; color: white; }
        .up { background: #00c076; } .down { background: #ff3b5c; }
    </style>
</head>
<body>
<header>
    <div style="color:#f0b90b; font-weight:bold;">X-TRADING LIVE</div>
    <div id="bal-display">₹ 1000.00</div>
</header>
<div id="chart-area"><div id="tv_chart"></div></div>
<div class="ui-panel">
    <input type="number" id="trade-amt" placeholder="Enter Amount (₹)">
    <div class="btn-group">
        <button class="btn up">UP</button>
        <button class="btn down">DOWN</button>
    </div>
</div>
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    new TradingView.widget({
        "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1",
        "theme": "dark", "container_id": "tv_chart", "hide_top_toolbar": true, "hide_legend": true
    });
</script>
</body>
</html>
