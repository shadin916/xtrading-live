<div class="time-row">
        <button class="t-btn active" onclick="setTime(30, this)">30s</button>
        <button class="t-btn" onclick="setTime(60, this)">1m</button>
        <button class="t-btn" onclick="setTime(180, this)">3m</button>
        <button class="t-btn" onclick="setTime(300, this)">5m</button>
    </div>
    <input type="number" id="trade-amt" placeholder="Enter Amount (₹)">
    <div class="btn-group">
        <button class="btn up" onclick="placeTrade('UP')">UP</button>
        <button class="btn down" onclick="placeTrade('DOWN')">DOWN</button>
    </div>
</div>

<div class="history-section">
    <div style="color: #848e9c; font-weight:bold; margin-bottom:10px;">CLOSED TRADES</div>
    <div id="history-list"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let balance = 1000;
    let selectedTime = 30;

    // 1. Live Candle Timer Logic
    function startCandleTimer() {
        setInterval(() => {
            let now = new Date();
            let secondsLeft = 60 - now.getSeconds();
            let displaySec = secondsLeft < 10 ? '0' + secondsLeft : secondsLeft;
            document.getElementById('candle-clock').innerText = 00:${displaySec};
        }, 1000);
    }
    startCandleTimer();

    new TradingView.widget({
        "autosize": true,
        "symbol": "BINANCE:BTCUSDT",
        "interval": "1",
        "theme": "dark",
        "container_id": "tv_chart",
        "hide_top_toolbar": true,
        "hide_legend": true,
        "disabled_features": ["volume_force_overlay", "create_volume_indicator_by_default"]
    });

    function setTime(sec, btn) {
        selectedTime = sec;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function placeTrade(dir) {
        let val = document.getElementById('trade-amt').value;
        if(!val) return alert("Enter amount!");
        let amt = parseFloat(val);
        if(amt > balance) return alert("Low balance!");
        
        balance -= amt; updateUI();
        document.getElementById('strike-line').style.display = 'block';

        let t = selectedTime;
        let cd = setInterval(() => {
            t--;
            document.getElementById('timer-label').innerText = t + "s";
            if(t <= 0) {
                clearInterval(cd);
                document.getElementById('strike-line').style.display = 'none';
                let win = Math.random() > 0.5;
                if(win) balance += (amt * 1.88);
                showPopup(win, win ? (amt * 1.88) : amt);
                addHistory(dir, amt, win, win ? (amt * 1.88) : 0);
            }
        }, 1000);
    }

    function addHistory(dir, amt, win, profit) {
        const list = document.getElementById('history-list');
        const item = document.createElement('div');
        item.className = 'hist-item';
        item.innerHTML = <span><b>${dir}</b> ₹${amt}</span><span style="color:${win?'#00c076':'#ff3b5c'}">${win?'+₹'+profit.toFixed(2):'-₹'+amt}</span>;
        list.prepend(item);
    }

    function showPopup(win, amt) {
        const val = document.getElementById('res-value');
        val.innerText = win ? "+₹" + amt.toFixed(2) : "₹0.00";
        val.style.color = win ? "#00c076" : "#ff3b5c";
        document.getElementById('res-popup').style.display = 'block';
        document.getElementById('fade').style.display = 'block';
        updateUI();
        setTimeout(() => {
            document.getElementById('res-popup').style.display = 'none';
            document.getElementById('fade').style.display = 'none';
        }, 5000);
    }

    function updateUI() { document.getElementById('bal-display').innerText = "₹ " + balance.toFixed(2); }
</script>
</body>
</html>
