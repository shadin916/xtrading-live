<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X TRADING | Professional</title>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; margin: 0; }
        .header { padding: 15px; background: #161b22; display: flex; justify-content: space-between; align-items: center; }
        .balance { color: #26a69a; font-size: 20px; font-weight: bold; }
        
        /* Chart Section */
        #chart-container { height: 60vh; width: 100%; }

        /* Trading Controls */
        .controls { display: flex; flex-direction: column; gap: 10px; padding: 20px; background: #161b22; border-radius: 20px 20px 0 0; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .up { background: #26a69a; color: white; }
        .down { background: #ef5350; color: white; }
        .amount-input { background: #0b0e11; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <span>X TRADING</span>
        <div class="balance">₹<span id="user-balance">0.00</span></div>
    </div>

    <div id="chart-container">
        <div id="live-chart" style="height: 100%;"></div>
    </div>

    <div class="controls">
        <input type="number" class="amount-input" id="trade-amount" placeholder="Enter Amount (₹)" value="100">
        <div class="btn-group">
            <button class="up" onclick="placeTrade('CALL')">CALL ↑</button>
            <button class="down" onclick="placeTrade('PUT')">PUT ↓</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Real Chart Initialize
        new TradingView.widget({
            "autosize": true,
            "symbol": "FX:EURUSD",
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "container_id": "live-chart",
            "hide_side_toolbar": true,
            "allow_symbol_change": true
        });

        function placeTrade(type) {
            let amt = document.getElementById('trade-amount').value;
            alert(type + " Trade Placed for ₹" + amt);
            // Ab yahan se Firebase ka connection shuru hoga
        }
    </script>
</body>
</html>
