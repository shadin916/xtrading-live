<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DREAM X TRADING</title>
    <style>
        body { background-color: #0b0e11; color: white; font-family: Arial, sans-serif; margin: 0; text-align: center; }
        .header { padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #2b2f36; }
        #chart-container { height: 400px; width: 100%; }
        .controls { padding: 20px; display: flex; justify-content: space-around; }
        .btn { padding: 15px 40px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .buy { background-color: #2ebd85; color: white; }
        .sell { background-color: #f6465d; color: white; }
    </style>
</head>
<body>
    <div class="header">DREAM X TRADING</div>
    
    <div id="chart-container">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div id="tradingview_chart" style="height:calc(100% - 32px);width:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:BTCUSDT", "interval": "1", "timezone": "Etc/UTC",
            "theme": "dark", "style": "1", "locale": "en", "toolbar_bg": "#f1f3f6",
            "enable_publishing": false, "hide_side_toolbar": false, "allow_symbol_change": true,
            "container_id": "tradingview_chart"
          });
          </script>
        </div>
    </div>

    <div class="controls">
        <button class="btn buy">BUY</button>
        <button class="btn sell">SELL</button>
    </div>

    <script>
        document.querySelector('.buy').onclick = () => alert('Trade Placed: Buy');
        document.querySelector('.sell').onclick = () => alert('Trade Placed: Sell');
    </script>
</body>
</html>
